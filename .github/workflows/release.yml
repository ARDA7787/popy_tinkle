name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release-binaries:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: popy-linux-x86_64.tar.gz
          - os: macos-14
            artifact: popy-macos-arm64.tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libcurl4-openssl-dev libmupdf-dev libseccomp-dev
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install cmake ninja mupdf
      - name: Build release
        run: |
          cmake -S popyd -B popyd/build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="$PWD/popyd/dist-root" -G Ninja
          cmake --build popyd/build -j2
          cmake --install popyd/build
          tar czf "${{ matrix.artifact }}" -C popyd/dist-root .
      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
