name: Fuzz

on:
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 2 * * 1"

jobs:
  fuzz:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang libcurl4-openssl-dev libmupdf-dev libseccomp-dev
      - name: Configure fuzz targets
        run: cmake -S popyd -B popyd/build-fuzz -DCMAKE_BUILD_TYPE=Debug -DPOPY_FUZZ=ON -DCMAKE_CXX_COMPILER=clang++ -G Ninja
      - name: Build fuzz targets
        run: cmake --build popyd/build-fuzz --target fuzz_sidecar fuzz_mime -j$(nproc)
      - name: Run fuzz_sidecar
        run: popyd/build-fuzz/fuzz_sidecar -max_total_time=60 -max_len=65536
      - name: Run fuzz_mime
        run: popyd/build-fuzz/fuzz_mime -max_total_time=60 -max_len=32
